appId: com.rzp.theflash
productName: The Flash
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - resources/**/*
icon: resources/icon.png
win:
  target:
    - nsis
  icon: resources/icon.png
nsis:
